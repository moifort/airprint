<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AirPrint Bridge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🖨️ AirPrint Bridge</h1>
    <p>Make your network printers visible to all your Apple devices.</p>
  </header>

  <main>
    <section id="printers-section">
      <div class="section-head">
        <h2>Shared printers</h2>
        <button id="show-wizard" class="primary">+ Add a printer</button>
      </div>
      <div id="printers-list"></div>
    </section>

    <section id="wizard" class="card hidden">
      <h2>New printer</h2>

      <!-- Step 1: IP address -->
      <div class="step" id="step-1">
        <label for="ip">Printer IP address</label>
        <div class="row">
          <input id="ip" type="text" placeholder="192.168.1.50" autocomplete="off">
          <button id="detect-btn" class="primary">Detect</button>
        </div>
        <p class="hint">The printer must be powered on and connected to the same network.</p>
      </div>

      <!-- Step 2: driver -->
      <div class="step hidden" id="step-2">
        <div id="detect-result"></div>

        <label for="driver-select">CUPS driver</label>
        <select id="driver-select"></select>

        <details id="manual-search">
          <summary>Can't find the right driver in the list?</summary>
          <label for="driver-query">Search by make and model</label>
          <div class="row">
            <input id="driver-query" type="text" placeholder="e.g. Brother HL-2030">
            <button id="search-btn">Search</button>
          </div>
          <label for="ppd-file" class="ppd-label">Or provide a PPD file</label>
          <input id="ppd-file" type="file" accept=".ppd">
        </details>

        <label for="uri-select">Connection</label>
        <select id="uri-select"></select>
      </div>

      <!-- Step 3: name -->
      <div class="step hidden" id="step-3">
        <label for="printer-name">Printer name</label>
        <input id="printer-name" type="text" placeholder="e.g. Office Printer">
        <button id="create-btn" class="primary big">Make available over AirPrint</button>
      </div>

      <p id="wizard-error" class="error hidden"></p>
      <button id="cancel-wizard" class="link">Cancel</button>
    </section>
  </main>

  <footer>
    <p>Powered by CUPS + Avahi · <a href=":631" id="cups-link">CUPS administration</a></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
